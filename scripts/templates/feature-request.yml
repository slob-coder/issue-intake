name: "🚀 Feature Request"
description: "Submit a development request — our AI team will build it for you!"
title: "[Request] "
labels: ["new-request"]
body:
  - type: markdown
    attributes:
      value: |
        ## 👋 Welcome!

        Thanks for submitting a request! Our AI development team will review and build your project automatically.

        **What we can build:**
        - CLI tools, scripts, utilities
        - Web apps (frontend/backend)
        - Libraries and packages
        - Data processing tools
        - Automation scripts

        **What's out of scope:**
        - Projects requiring paid APIs or proprietary services
        - Projects involving sensitive/personal data
        - Projects with complex infrastructure requirements
        - Anything violating GitHub ToS or applicable laws

  - type: textarea
    id: description
    attributes:
      label: "📝 Description"
      description: "What do you want built? What problem does it solve?"
      placeholder: "A CLI tool that converts Markdown files to styled PDF documents..."
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: "📋 Requirements"
      description: "Specific features, functionality, or behavior you'd like."
      placeholder: |
        - Support CommonMark and GFM syntax
        - Custom CSS styling support
        - Table of contents generation
        - Code syntax highlighting
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: "🔧 Constraints (optional)"
      description: "Language, framework, platform, or other technical preferences."
      placeholder: "Preferably in Python, should work on Linux/macOS/Windows"
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: "📎 References (optional)"
      description: "Links, screenshots, examples, or inspiration."
      placeholder: "Similar to pandoc but simpler: https://pandoc.org/"
    validations:
      required: false

  - type: dropdown
    id: license
    attributes:
      label: "📄 License"
      description: "What license should the project use?"
      options:
        - MIT (default)
        - Apache-2.0
        - GPL-3.0
        - BSD-3-Clause
        - Unlicense
      default: 0
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: "✅ Acknowledgements"
      options:
        - label: "I understand this is a free service powered by AI and results may vary"
          required: true
        - label: "My request doesn't involve sensitive data or violate any laws"
          required: true
